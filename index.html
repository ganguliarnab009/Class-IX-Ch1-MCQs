<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>জীববিদ্যা MCQ কুইজ - অধ্যায় ১</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Hind Siliguri', sans-serif; }
  body { background: #eef4ff; min-height: 100vh; }

  .topic-card {
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }
  .topic-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 16px 40px rgba(0,0,0,0.18);
  }

  .option-btn {
    transition: all 0.18s;
    text-align: left;
    width: 100%;
    cursor: pointer;
    border: 2px solid #e5e7eb;
    background: #f9fafb;
  }
  .option-btn:not(:disabled):hover {
    transform: translateX(5px);
    border-color: #93c5fd;
    background: #eff6ff;
    box-shadow: 0 3px 12px rgba(59,130,246,0.12);
  }
  .option-btn:disabled { cursor: default; }
  .option-correct { background: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; }
  .option-wrong   { background: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }

  .progress-bar { transition: width 0.5s ease; }

  .fade-in { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .confetti-anim { animation: pop 0.4s ease; }
  @keyframes pop {
    0%   { transform: scale(0.75); opacity: 0; }
    65%  { transform: scale(1.08); }
    100% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>

<!-- ===== HOME PAGE ===== -->
<div id="homePage" class="min-h-screen p-4 md:p-8">
  <div class="max-w-5xl mx-auto">

    <div class="text-center mb-10">
      <div class="inline-block bg-white rounded-3xl px-8 py-6 shadow-lg mb-4">
        <h1 class="text-3xl md:text-4xl font-bold text-blue-800">🧬 জীববিদ্যা কুইজ</h1>
        <p class="text-gray-400 mt-1 text-base font-medium">অধ্যায় ১ · মোট 380টি MCQ</p>
      </div>
      <p class="text-gray-600 text-lg">একটি টপিক বেছে নিয়ে কুইজ শুরু করো!</p>
    </div>

    <div id="topicGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5"></div>
  </div>
</div>

<!-- ===== QUIZ PAGE ===== -->
<div id="quizPage" class="hidden min-h-screen flex flex-col">

  <!-- Header -->
  <div class="bg-white shadow-sm sticky top-0 z-10">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between gap-3">
      <div class="flex items-center gap-3 min-w-0">
        <button onclick="goHome()"
          class="flex-shrink-0 w-10 h-10 flex items-center justify-center rounded-2xl bg-blue-50 hover:bg-blue-100 text-blue-700 text-xl transition">🏠</button>
        <div class="min-w-0">
          <div class="font-bold text-gray-800 text-base leading-tight truncate" id="quizTopicTitle"></div>
          <div class="text-xs text-gray-400 font-medium" id="quizProgress"></div>
        </div>
      </div>
      <button onclick="goHome()"
        class="flex-shrink-0 hidden sm:flex items-center gap-1 text-sm bg-gray-100 hover:bg-gray-200 text-gray-600 font-semibold px-4 py-2 rounded-2xl transition">
        ← হোমে ফিরুন
      </button>
    </div>
    <!-- Progress bar -->
    <div class="w-full bg-gray-100 h-2">
      <div id="progressBar" class="progress-bar bg-blue-500 h-2 rounded-r-full" style="width:0%"></div>
    </div>
  </div>

  <!-- Score bar -->
  <div class="bg-white border-b border-gray-100">
    <div class="max-w-3xl mx-auto px-4 py-2 flex gap-6 text-sm font-semibold">
      <span class="text-green-600">✅ সঠিক: <span id="scoreCorrect">0</span></span>
      <span class="text-red-500">❌ ভুল: <span id="scoreWrong">0</span></span>
    </div>
  </div>

  <!-- Question card -->
  <div class="flex-1 max-w-3xl mx-auto w-full px-4 py-5">

    <div id="questionCard" class="bg-white rounded-3xl shadow-md p-5 md:p-7 fade-in">
      <p class="text-gray-400 text-xs font-bold uppercase tracking-widest mb-3">
        প্রশ্ন <span id="qNum"></span>
      </p>
      <p id="questionText" class="font-semibold text-gray-800 leading-relaxed mb-6"
         style="font-size:1.45rem; line-height:2rem;"></p>

      <div id="optionsContainer" class="flex flex-col gap-3"></div>

      <!-- Feedback -->
      <div id="feedbackBox" class="hidden mt-5 rounded-2xl px-5 py-4 font-semibold"
           style="font-size:1rem"></div>

      <!-- Nav buttons -->
      <div class="flex items-center justify-between mt-6">
        <button onclick="resetQuiz()"
          class="flex items-center gap-2 bg-gray-100 hover:bg-gray-200 text-gray-600 font-semibold px-5 py-3 rounded-2xl transition shadow-sm text-sm md:text-base">
          🔄 রিসেট
        </button>
        <button id="nextBtn" onclick="nextQuestion()"
          class="hidden items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-bold px-7 py-3 rounded-2xl transition shadow-md text-sm md:text-base">
          পরবর্তী প্রশ্ন →
        </button>
      </div>
    </div>

    <!-- Finish screen -->
    <div id="finishCard" class="hidden bg-white rounded-3xl shadow-md p-8 text-center confetti-anim">
      <div class="text-6xl mb-4">🎉</div>
      <h2 class="text-2xl font-bold text-gray-800 mb-2">অভিনন্দন!</h2>
      <p class="text-gray-500 mb-1 text-lg">তুমি সব প্রশ্ন শেষ করেছ।</p>
      <p id="scoreText" class="text-4xl font-bold text-blue-700 my-4"></p>
      <p id="gradeText" class="text-xl font-semibold mb-6"></p>
      <div class="flex flex-col sm:flex-row gap-3 justify-center">
        <button onclick="resetQuiz()"
          class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-8 py-3 rounded-2xl text-lg transition shadow">
          🔄 আবার চেষ্টা করো
        </button>
        <button onclick="goHome()"
          class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold px-8 py-3 rounded-2xl text-lg transition">
          🏠 হোমে ফিরুন
        </button>
      </div>
    </div>

  </div>
</div>

<script>
const allQuestions = {
  topic1: [
    {q:'পৃথিবীর উৎপত্তি আজ থেকে প্রায় কত বছর আগে হয়েছিল?',a:'৪.৬ বিলিয়ন',o:['৪.৬ বিলিয়ন','৩.৭ বিলিয়ন','৩.৫ বিলিয়ন','১.৯ বিলিয়ন']},
    {q:'পৃথিবীতে প্রথম প্রাণের সৃষ্টি হয়েছিল প্রায় কত বছর পূর্বে?',a:'৩.৭ বিলিয়ন',o:['৪.৬ বিলিয়ন','৩.৭ বিলিয়ন','৩.৫ বিলিয়ন','১.৯ বিলিয়ন']},
    {q:'জীবন সৃষ্টির রাসায়নিক তত্ত্ব কে প্রস্তাব করেন?',a:'ওপারিন ও হ্যালডেন',o:['ডারউইন','ল্যামার্ক','ওপারিন ও হ্যালডেন','সিডনি ফক্স']},
    {q:'আদিম পৃথিবীর বায়ুমণ্ডলে কোন গ্যাসটি মুক্ত অবস্থায় ছিল না?',a:'অক্সিজেন',o:['হাইড্রোজেন','নাইট্রোজেন','মিথেন','অক্সিজেন']},
    {q:'হ্যালডেনের মতে আদিম সমুদ্রের মিশ্রণকে কী বলা হয়?',a:'গরম তরল স্যুপ',o:['মাইক্রোস্ফিয়ার','গরম তরল স্যুপ','কোয়াসারভেট','প্রোটোবায়োন্ট']},
    {q:'আদিম পৃথিবীর বায়ুমণ্ডল কেমন প্রকৃতির ছিল?',a:'বিজারক',o:['জারক','বিজারক','নিরপেক্ষ','কোনোটিই নয়']},
    {q:'কোয়াসারভেট তত্ত্বের প্রবক্তা কে?',a:'ওপারিন',o:['ওপারিন','সিডনি ফক্স','হ্যালডেন','অ্যারিস্টটল']},
    {q:'মাইক্রোস্ফিয়ার তত্ত্বের প্রবক্তা কে?',a:'সিডনি ফক্স',o:['ওপারিন','সিডনি ফক্স','হ্যালডেন','ডারউইন']},
    {q:'কোয়াসারভেট বা মাইক্রোস্ফিয়ারের সাথে নিউক্লিক অ্যাসিড যুক্ত হয়ে কী তৈরি হয়?',a:'প্রোটোবায়োন্ট',o:['প্রোটিন','প্রোটোবায়োন্ট','নগ্ন জিন','শর্করা']},
    {q:'পৃথিবীতে প্রথম উৎপন্ন নিউক্লিক অ্যাসিড কোনটি?',a:'RNA',o:['DNA','RNA','ATP','NADP']},
    {q:'\'নগ্ন জিন\' কাকে বলা হয়?',a:'প্রোটিনবিহীন একতন্ত্রী RNA',o:['প্রোটিনবিহীন DNA','প্রোটিনবিহীন একতন্ত্রী RNA','ক্রোমোজোম','রাইবোজোম']},
    {q:'প্রথম সৃষ্ট প্রকৃত এককোষী জীব বা \'ইওবায়োন্ট\' কীরূপ ছিল?',a:'রাসায়নিক পরভোজী',o:['সালোকসংশ্লেষকারী','রাসায়নিক পরভোজী','স্বভোজী','মৃতজীবী']},
    {q:'বায়ুমণ্ডলে প্রথম মুক্ত অক্সিজেন তৈরি করেছিল কারা?',a:'সায়ানোব্যাকটেরিয়া',o:['সালফার ব্যাকটেরিয়া','সায়ানোব্যাকটেরিয়া','ছত্রাক','ভাইরাস']},
    {q:'প্রোটোবায়োন্ট থেকে প্রথম এককোষী জীবের সৃষ্টি হতে কত সময় লেগেছিল?',a:'৩.৫ বিলিয়ন বছর পূর্বে',o:['৩.৫ বিলিয়ন বছর পূর্বে','১.৯ বিলিয়ন বছর পূর্বে','৪.৬ বিলিয়ন বছর পূর্বে','৩.৭ বিলিয়ন বছর পূর্বে']},
    {q:'জীবদেহে গঠনমূলক বিপাককে কী বলা হয়?',a:'উপচিতি',o:['অপচিতি','উপচিতি','শ্বসন','রেচন']},
    {q:'উপচিতি বিপাকের ফলে জীবদেহের শুষ্ক ওজনের কী পরিবর্তন ঘটে?',a:'বৃদ্ধি পায়',o:['কমে যায়','একই থাকে','বৃদ্ধি পায়','শূন্য হয়ে যায়']},
    {q:'নিচের কোনটি অপচিতি বিপাকের একটি উদাহরণ?',a:'শ্বসন',o:['সালোকসংশ্লেষ','পুষ্টি','প্রজনন','শ্বসন']},
    {q:'জীবদেহের প্রাণ বা \'ভৌত ভিত্তি\' (Physical basis of life) কাকে বলা হয়?',a:'প্রোটোপ্লাজম',o:['প্রোটিন','প্রোটোপ্লাজম','নিউক্লিয়াস','কোষপ্রাচীর']},
    {q:'সৃষ্টির শুরুতে আদিম পৃথিবীর তাপমাত্রা প্রায় কত ছিল?',a:'৫০০০-৬০০০°C',o:['১০০০-২০০০°C','৩০০০-৪০০০°C','৫০০০-৬০০০°C','৭০০০-৮০০০°C']},
    {q:'আদিম পৃথিবীর বায়ুমণ্ডলে থাকা সায়ানোজেন গ্যাসের সংকেত কী?',a:'CN2',o:['CH4','NH3','CN2','CO2']},
    {q:'বিজ্ঞানী ওপারিনের মতে, কোয়াসারভেটের আবরণীটি কী দিয়ে তৈরি ছিল?',a:'দ্বিস্তরী ফসফোলিপিড',o:['দ্বিস্তরী ফসফোলিপিড','সেলুলোজ','কাইটিন','পেপটাইডোগ্লাইক্যান']},
    {q:'কোয়াসারভেটের আকার সাধারণত কত ছিল?',a:'১০-৫০০ মাইক্রন',o:['১-৫ মাইক্রন','১০-৫০০ মাইক্রন','১-১০ ন্যানোমিটার','৫০০-১০০০ মাইক্রন']},
    {q:'মাইক্রোস্ফিয়ারের আকার সাধারণত কত মাইক্রন ছিল?',a:'১-৫ মাইক্রন',o:['১-৫ মাইক্রন','১০-৫০ মাইক্রন','১০০-৫০০ মাইক্রন','১০০০ মাইক্রন']},
    {q:'মাইক্রোস্ফিয়ারের ভেতরে থাকা প্রোটিনসদৃশ অণুকে কী বলা হত?',a:'প্রোটিনয়েড',o:['প্রোটিনয়েড','নিউক্লিওটাইড','লিপিড','শর্করা']},
    {q:'কেমোজেনি প্রক্রিয়ার দ্বিতীয় ধাপে কোন যৌগের সৃষ্টি হয়?',a:'জটিল জৈব যৌগ',o:['সরল জৈব যৌগ','হাইড্রোকার্বন','জটিল জৈব যৌগ','অজৈব যৌগ']},
    {q:'প্রোটোবায়োন্ট থেকে সৃষ্ট প্রথম প্রকৃত এককোষী জীব বা \'ইওবায়োন্ট\'-দের শ্বসন কেমন প্রকৃতির ছিল?',a:'অবাত শ্বসনকারী',o:['সবাত শ্বসনকারী','অবাত শ্বসনকারী','পরজীবী','মৃতজীবী']},
    {q:'সালোকসংশ্লেষে সক্ষম নীলাভ সবুজ শৈবাল বা সায়ানোব্যাকটেরিয়ার উদ্ভব কবে হয়েছিল?',a:'১.৯ বিলিয়ন বছর পূর্বে',o:['৪.৬ বিলিয়ন বছর পূর্বে','৩.৭ বিলিয়ন বছর পূর্বে','৩.৫ বিলিয়ন বছর পূর্বে','১.৯ বিলিয়ন বছর পূর্বে']},
    {q:'জীব মাত্রই বাইরের উদ্দীপনায় সাড়া দেয়—জীবের এই ধর্মকে কী বলে?',a:'উত্তেজিতা',o:['উত্তেজিতা','বিপাক','চলন','বৃদ্ধি']},
    {q:'কোয়াসারভেট মডেলের প্রবক্তা ওপারিন এবং মাইক্রোস্ফিয়ারের প্রবক্তা কে?',a:'সিডনি ফক্স',o:['হ্যালডেন','সিডনি ফক্স','ল্যামার্ক','ডারউইন']},

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

  const grid = document.getElementById('topicGrid');
  grid.innerHTML = topics.map(t => {
    const count = (allQuestions[t.id] || []).length;
    return `
      <div class="topic-card bg-gradient-to-br ${t.color} text-white rounded-3xl p-6 shadow-lg"
           onclick="startTopic('${t.id}')">
        <div class="text-4xl mb-3">${t.icon}</div>
        <h3 class="text-lg font-bold leading-snug mb-2">${t.name}</h3>
        <p class="text-white/80 text-sm font-medium">${count}টি প্রশ্ন</p>
      </div>`;
  }).join('');
}

function startTopic(topicId) {
  currentTopic = topicId;
  currentQuestions = shuffle(allQuestions[topicId] || []);
  currentIndex = 0;
  scoreCorrect = 0;
  scoreWrong = 0;
  document.getElementById('homePage').classList.add('hidden');
  document.getElementById('quizPage').classList.remove('hidden');
  const topic = topics.find(t => t.id === topicId);
  document.getElementById('quizTopicTitle').textContent = topic ? topic.name : '';
  updateScoreDisplay();
  showQuestion();
}

function updateScoreDisplay() {
  document.getElementById('scoreCorrect').textContent = scoreCorrect;
  document.getElementById('scoreWrong').textContent = scoreWrong;
}

function showQuestion() {
  const q = currentQuestions[currentIndex];
  const total = currentQuestions.length;
  document.getElementById('quizProgress').textContent = `প্রশ্ন ${currentIndex + 1} / ${total}`;
  document.getElementById('qNum').textContent = `${currentIndex + 1} / ${total}`;
  document.getElementById('progressBar').style.width = (currentIndex / total * 100) + '%';
  document.getElementById('questionText').textContent = q.q;

  const shuffledOpts = shuffle(q.o);
  document.getElementById('optionsContainer').innerHTML = shuffledOpts.map(opt => `
    <button class="option-btn font-medium px-5 py-4 rounded-2xl shadow-sm"
            style="font-size:1.15rem; line-height:1.6rem"
            onclick="checkAnswer(this, this.dataset.opt, this.dataset.correct)"
            data-opt="${opt.replace(/"/g,'&quot;')}"
            data-correct="${q.a.replace(/"/g,'&quot;')}">
      ${opt}
    </button>`).join('');

  document.getElementById('feedbackBox').classList.add('hidden');
  document.getElementById('nextBtn').classList.add('hidden');
  document.getElementById('nextBtn').classList.remove('flex');
  document.getElementById('questionCard').classList.remove('hidden');
  document.getElementById('finishCard').classList.add('hidden');
  answered = false;
}

function checkAnswer(btn, selected, correct) {
  if (answered) return;
  answered = true;

  document.querySelectorAll('.option-btn').forEach(b => {
    b.disabled = true;
    const v = b.dataset.opt;
    if (v === correct) b.classList.add('option-correct');
    if (v === selected && selected !== correct) b.classList.add('option-wrong');
  });

  const fb = document.getElementById('feedbackBox');
  fb.classList.remove('hidden');
  if (selected === correct) {
    scoreCorrect++;
    fb.className = 'mt-5 rounded-2xl px-5 py-4 font-semibold bg-green-50 border-2 border-green-300 text-green-800';
    fb.textContent = '✅ সঠিক! উত্তর: ' + correct;
  } else {
    scoreWrong++;
    fb.className = 'mt-5 rounded-2xl px-5 py-4 font-semibold bg-red-50 border-2 border-red-300 text-red-800';
    fb.textContent = '❌ ভুল। সঠিক উত্তর: ' + correct;
  }
  updateScoreDisplay();
  document.getElementById('nextBtn').classList.remove('hidden');
  document.getElementById('nextBtn').classList.add('flex');
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= currentQuestions.length) {
    showFinish();
  } else {
    showQuestion();
  }
}

function showFinish() {
  document.getElementById('questionCard').classList.add('hidden');
  document.getElementById('finishCard').classList.remove('hidden');
  const total = currentQuestions.length;
  const pct = Math.round(scoreCorrect / total * 100);
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('quizProgress').textContent = 'সম্পন্ন!';
  document.getElementById('scoreText').textContent = `${scoreCorrect} / ${total} (${pct}%)`;
  let grade = '';
  if (pct >= 90) grade = '🏆 অসাধারণ!';
  else if (pct >= 75) grade = '🌟 খুব ভালো!';
  else if (pct >= 60) grade = '👍 ভালো!';
  else if (pct >= 40) grade = '📚 আরও পড়তে হবে';
  else grade = '💪 চেষ্টা চালিয়ে যাও!';
  document.getElementById('gradeText').textContent = grade;
}

function resetQuiz() {
  startTopic(currentTopic);
}

function goHome() {
  document.getElementById('homePage').classList.remove('hidden');
  document.getElementById('quizPage').classList.add('hidden');
}

renderHome();
</script>
</body>
</html>
